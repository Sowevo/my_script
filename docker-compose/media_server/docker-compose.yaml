#      - /vol3/1000/docker_volume/icloudpd_02:/config
#      # 媒体目录
#      - /vol2/1000/personal_volume/photos/iCloud/02:/iCloud

  # watchtower 自动更新
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    hostname: watchtower
    restart: always
    environment:
      - WATCHTOWER_LABEL_ENABLE=true  # 只监控带有 com.centurylinklabs.watchtower.enable=true 标签的容器
      - WATCHTOWER_POLL_INTERVAL=3600  # 检查间隔时间
      - WATCHTOWER_CLEANUP=true # 自动清理旧镜像
      - TZ=Asia/Shanghai # 时区
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      macvlan:
        ipv4_address: 10.0.0.52
    mac_address: 10:00:00:00:00:52
  # coolercontrol 风扇控制
  coolercontrol:
    image: ghcr.io/guniv/coolercontrol-docker
    container_name: coolercontrol
    hostname: coolercontrol
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    privileged: true  # 开启特权模式
    volumes:
      - /sys/class/hwmon:/sys/class/hwmon
      # 配置文件夹
      - /vol3/1000/docker_volume/coolercontrol:/etc/coolercontrol
    networks:
      macvlan:
        ipv4_address: 10.0.0.56
    mac_address: 10:00:00:00:00:56
    ports:
      - "11987:11987"


  sub2api:
    image: weishaw/sub2api:latest
    container_name: sub2api
    hostname: sub2api
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      sub2api-postgres:
        condition: service_healthy
      sub2api-redis:
        condition: service_healthy
    networks:
      macvlan:
        ipv4_address: 10.0.0.66
    mac_address: 10:00:00:00:00:66
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - TZ=Asia/Shanghai
      - DATABASE_HOST=sub2api-postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=sub2api
      - DATABASE_PASSWORD=${SUB2API_POSTGRES_PASSWORD}
      - DATABASE_DBNAME=sub2api
      - DATABASE_SSLMODE=disable
      - REDIS_HOST=sub2api-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${SUB2API_REDIS_PASSWORD}
      - REDIS_DB=0
      - ADMIN_EMAIL=${SUB2API_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${SUB2API_ADMIN_PASSWORD}
      - JWT_SECRET=${SUB2API_JWT_SECRET}
      - TOTP_ENCRYPTION_KEY=${SUB2API_TOTP_KEY}
    volumes:
      - /vol3/1000/docker_volume/sub2api/data:/app/data
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  sub2api-postgres:
    image: postgres:18-alpine
    container_name: sub2api-postgres
    hostname: sub2api-postgres
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      macvlan:
        ipv4_address: 10.0.0.67
    mac_address: 10:00:00:00:00:67
    environment:
      - POSTGRES_USER=sub2api
      - POSTGRES_PASSWORD=${SUB2API_POSTGRES_PASSWORD}
      - POSTGRES_DB=sub2api
      - TZ=Asia/Shanghai
    volumes:
      - /vol3/1000/docker_volume/sub2api/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub2api -d sub2api"]
      interval: 10s
      timeout: 5s
      retries: 5

  sub2api-redis:
    image: redis:8-alpine
    container_name: sub2api-redis
    hostname: sub2api-redis
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      macvlan:
        ipv4_address: 10.0.0.68
    mac_address: 10:00:00:00:00:68
    environment:
      - TZ=Asia/Shanghai
    command: redis-server --save 60 1 --appendonly yes --requirepass ${SUB2API_REDIS_PASSWORD}
    volumes:
      - /vol3/1000/docker_volume/sub2api/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SUB2API_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  homeassistant:
    image: homeassistant/home-assistant:stable
    container_name: homeassistant
    hostname: homeassistant
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      macvlan:
        ipv4_address: 10.0.0.69
    mac_address: 10:00:00:00:00:69
    ports:
      - "8123:8123"
    privileged: true
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /vol3/1000/docker_volume/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro

  sgcc-electricity:
    image: registry.cn-hangzhou.aliyuncs.com/arcw/sgcc_electricity:latest
    container_name: sgcc-electricity
    hostname: sgcc-electricity
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      homeassistant:
        condition: service_started
    networks:
      macvlan:
        ipv4_address: 10.0.0.62
    mac_address: 10:00:00:00:00:62
    environment:
      - TZ=Asia/Shanghai
      - PHONE_NUMBER=${SGCC_PHONE_NUMBER}
      - PASSWORD=${SGCC_PASSWORD}
      - IGNORE_USER_ID=${SGCC_IGNORE_USER_ID}
      - DB_TYPE=${SGCC_DB_TYPE:-NONE}
      - DB_NAME=${SGCC_DB_NAME:-homeassistant.db}
      - HASS_URL=${SGCC_HASS_URL:-http://homeassistant:8123/}
      - HASS_TOKEN=${SGCC_HASS_TOKEN}
      - JOB_START_TIME=${SGCC_JOB_START_TIME:-07:00}
      - RETRY_WAIT_TIME_OFFSET_UNIT=${SGCC_RETRY_WAIT_TIME_OFFSET_UNIT:-15}
      - DATA_RETENTION_DAYS=${SGCC_DATA_RETENTION_DAYS:-7}
      - PUSH_TYPE=${SGCC_PUSH_TYPE:-None}
      - BALANCE=${SGCC_BALANCE:-5.0}
      - PUSHPLUS_TOKEN=${SGCC_PUSHPLUS_TOKEN:-}
      - PUSH_URL=${SGCC_PUSH_URL:-}
      - LOGIN_FALLBACK=${SGCC_LOGIN_FALLBACK:-qrcode}
      - PUSH_QRCODE_URL=${SGCC_PUSH_QRCODE_URL:-}
      - QR_CODE_LOGIN_WAIT_COUNT=${SGCC_QR_CODE_LOGIN_WAIT_COUNT:-30}
      - QR_CODE_LOGIN_WAIT_TIME_INTERVAL_UNIT=${SGCC_QR_CODE_LOGIN_WAIT_TIME_INTERVAL_UNIT:-10}
      - OP_NUM_THREADS=${SGCC_OP_NUM_THREADS:-}
    volumes:
      - /vol3/1000/docker_volume/sgcc_electricity/data:/app/data
      - /etc/localtime:/etc/localtime:ro

## 需要提前手动创建这个网络
## docker network create --driver macvlan --subnet 10.0.0.0/24 --gateway 10.0.0.1 --opt parent=eno1 macvlan
#networks:
#  macvlan:
#    external: true
#    name: macvlan


networks:
  macvlan:
    driver: macvlan
    driver_opts:
      parent: eno1
      # 这是网口2的名字，可以通过ifconfig查看
      # parent: qvs0
    ipam:
      config:
        - subnet: 10.0.0.0/24
          gateway: 10.0.0.1
