<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>头像加国旗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 28px;
            color: #e94560;
        }

        /* ===== 预览区 ===== */
        .preview {
            position: relative;
            width: 300px;
            height: 300px;
            border: 2px dashed #0f3460;
            border-radius: 12px;
            overflow: hidden;
            background: #16213e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview:hover {
            border-color: #e94560;
        }

        .preview input {
            display: none;
        }

        .preview canvas {
            display: none;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .preview .hint {
            color: #555;
            font-size: .95rem;
            user-select: none;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            max-width: 600px;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 4px 8px;
        }

        .tool-group .label {
            font-size: .8rem;
            color: #888;
            margin-right: 4px;
            white-space: nowrap;
        }

        .tool-group button {
            background: transparent;
            color: #ccc;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: .85rem;
            transition: background .15s;
        }

        .tool-group button:hover {
            background: #0f3460;
        }

        .tool-group button.active {
            background: #e94560;
            color: #fff;
        }

        .tool-group input[type="range"] {
            width: 90px;
            accent-color: #e94560;
        }

        .tool-group input[type="color"] {
            width: 28px;
            height: 28px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            cursor: pointer;
            background: none;
            padding: 1px;
        }

        .tool-group .val {
            font-size: .8rem;
            color: #aaa;
            min-width: 28px;
            text-align: center;
        }

        /* ===== 国旗网格 ===== */
        .flags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-top: 20px;
            max-width: 600px;
        }

        .flags .flag {
            flex: 0 0 calc(10% - 6px);
            height: 44px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #16213e;
            transition: border-color .15s;
        }

        .flags .flag:hover {
            border-color: #0f3460;
        }

        .flags .flag.selected {
            border-color: #e94560;
        }

        .flags .flag img {
            width: 32px;
            height: 32px;
            object-fit: cover;
        }

        /* ===== 更多国旗弹窗 ===== */
        .more-btn {
            flex: 0 0 calc(10% - 6px);
            height: 44px;
            border-radius: 8px;
            border: 2px dashed #0f3460;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: #888;
            font-size: 1.2rem;
            transition: border-color .15s, color .15s;
        }

        .more-btn:hover {
            border-color: #e94560;
            color: #e94560;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
            width: 520px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .modal h3 {
            margin-bottom: 12px;
            color: #eee;
            font-size: 1rem;
        }

        .modal input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: .9rem;
            outline: none;
            margin-bottom: 12px;
        }

        .modal input[type="text"]:focus {
            border-color: #e94560;
        }

        .modal .flag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            overflow-y: auto;
            flex: 1;
        }

        .modal .flag-list .flag {
            cursor: pointer;
            width: 36px;
            height: 36px;
        }

        .modal .flag-list .flag img {
            width: 26px;
            height: 26px;
        }

        .modal .flag-list .flag:hover {
            border-color: #e94560;
        }

        /* ===== 操作按钮 ===== */
        .actions {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }

        .actions button {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background .2s;
        }

        #btnSave {
            background: #e94560;
            color: #fff;
        }

        #btnSave:hover {
            background: #c73650;
        }

        #btnSave:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #btnReset {
            background: #0f3460;
            color: #eee;
        }

        #btnReset:hover {
            background: #16213e;
        }
    </style>
</head>
<body>

<h1>头像加国旗工具</h1>

<!-- 预览区（点击上传） -->
<div class="preview" id="preview">
    <input type="file" id="fileInput" accept="image/*">
    <canvas id="canvas"></canvas>
    <span class="hint" id="hint">点击上传头像</span>
</div>

<!-- 工具栏 -->
<div class="toolbar">
    <div class="tool-group">
        <span class="label">大小</span>
        <input type="range" id="flagSize" min="15" max="50" value="30">
        <span class="val" id="sizeVal">30%</span>
    </div>

    <div class="tool-group" id="srcGroup">
        <span class="label">样式</span>
        <button data-v="rect">方形</button>
        <button data-v="circle" class="active">圆形</button>
    </div>

    <div class="tool-group" id="borderGroup">
        <span class="label">描边</span>
        <button data-v="on" class="active">有</button>
        <button data-v="off">无</button>
        <input type="color" id="borderColor" value="#ffffff">
        <input type="range" id="borderWidth" min="1" max="10" value="3">
        <span class="val" id="bwVal">3</span>
    </div>

    <div class="tool-group" id="posGroup">
        <span class="label">位置</span>
        <button data-v="top-left">↖</button>
        <button data-v="top-right">↗</button>
        <button data-v="bottom-left">↙</button>
        <button data-v="bottom-right" class="active">↘</button>
    </div>
</div>

<!-- 国旗列表 -->
<div class="flags" id="flagGrid"></div>

<!-- 操作 -->
<div class="actions">
    <button id="btnSave" disabled>保存图片</button>
    <button id="btnReset">重置</button>
</div>

<!-- 更多国旗弹窗 -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3>选择更多国旗</h3>
        <input type="text" id="searchInput" placeholder="搜索国家名称或代码...">
        <div class="flag-list" id="allFlagList"></div>
    </div>
</div>

<script>

        {code: 'BT', name: '不丹'}, {code: 'BW', name: '博茨瓦纳'}, {code: 'BY', name: '白俄罗斯'},
        {code: 'BZ', name: '伯利兹'}, {code: 'CD', name: '刚果(金)'}, {code: 'CF', name: '中非'},
        {code: 'CG', name: '刚果(布)'}, {code: 'CI', name: '科特迪瓦'}, {code: 'CL', name: '智利'},
        {code: 'CM', name: '喀麦隆'}, {code: 'CO', name: '哥伦比亚'}, {code: 'CR', name: '哥斯达黎加'},
        {code: 'CU', name: '古巴'}, {code: 'CV', name: '佛得角'}, {code: 'CY', name: '塞浦路斯'},
        {code: 'CZ', name: '捷克'}, {code: 'DJ', name: '吉布提'}, {code: 'DK', name: '丹麦'},
        {code: 'DM', name: '多米尼克'}, {code: 'DO', name: '多米尼加'}, {code: 'DZ', name: '阿尔及利亚'},
        {code: 'EC', name: '厄瓜多尔'}, {code: 'EE', name: '爱沙尼亚'}, {code: 'EG', name: '埃及'},
        {code: 'ER', name: '厄立特里亚'}, {code: 'ET', name: '埃塞俄比亚'}, {code: 'FI', name: '芬兰'},
        {code: 'FJ', name: '斐济'}, {code: 'GA', name: '加蓬'}, {code: 'GD', name: '格林纳达'},
        {code: 'GE', name: '格鲁吉亚'}, {code: 'GH', name: '加纳'}, {code: 'GM', name: '冈比亚'},
        {code: 'GN', name: '几内亚'}, {code: 'GQ', name: '赤道几内亚'}, {code: 'GR', name: '希腊'},
        {code: 'GT', name: '危地马拉'}, {code: 'GW', name: '几内亚比绍'}, {code: 'GY', name: '圭亚那'},
        {code: 'HN', name: '洪都拉斯'}, {code: 'HR', name: '克罗地亚'}, {code: 'HT', name: '海地'},
        {code: 'HU', name: '匈牙利'}, {code: 'IE', name: '爱尔兰'}, {code: 'IL', name: '以色列'},
        {code: 'IQ', name: '伊拉克'}, {code: 'IR', name: '伊朗'}, {code: 'IS', name: '冰岛'},
        {code: 'JM', name: '牙买加'}, {code: 'JO', name: '约旦'}, {code: 'KE', name: '肯尼亚'},
        {code: 'KG', name: '吉尔吉斯斯坦'}, {code: 'KH', name: '柬埔寨'}, {code: 'KI', name: '基里巴斯'},
        {code: 'KM', name: '科摩罗'}, {code: 'KN', name: '圣基茨和尼维斯'}, {code: 'KP', name: '朝鲜'},
        {code: 'KW', name: '科威特'}, {code: 'KZ', name: '哈萨克斯坦'}, {code: 'LA', name: '老挝'},
        {code: 'LB', name: '黎巴嫩'}, {code: 'LC', name: '圣卢西亚'}, {code: 'LI', name: '列支敦士登'},
        {code: 'LK', name: '斯里兰卡'}, {code: 'LR', name: '利比里亚'}, {code: 'LS', name: '莱索托'},
        {code: 'LT', name: '立陶宛'}, {code: 'LU', name: '卢森堡'}, {code: 'LV', name: '拉脱维亚'},
        {code: 'LY', name: '利比亚'}, {code: 'MA', name: '摩洛哥'}, {code: 'MC', name: '摩纳哥'},
        {code: 'MD', name: '摩尔多瓦'}, {code: 'ME', name: '黑山'}, {code: 'MG', name: '马达加斯加'},
        {code: 'MK', name: '北马其顿'}, {code: 'ML', name: '马里'}, {code: 'MM', name: '缅甸'},
        {code: 'MN', name: '蒙古'}, {code: 'MR', name: '毛里塔尼亚'}, {code: 'MT', name: '马耳他'},
        {code: 'MU', name: '毛里求斯'}, {code: 'MV', name: '马尔代夫'}, {code: 'MW', name: '马拉维'},
        {code: 'MZ', name: '莫桑比克'}, {code: 'NA', name: '纳米比亚'}, {code: 'NE', name: '尼日尔'},
        {code: 'NI', name: '尼加拉瓜'}, {code: 'NO', name: '挪威'}, {code: 'ZW', name: '津巴布韦'},
        {code: 'NP', name: '尼泊尔'}, {code: 'NR', name: '瑙鲁'}, {code: 'OM', name: '阿曼'},
        {code: 'PA', name: '巴拿马'}, {code: 'PE', name: '秘鲁'}, {code: 'PG', name: '巴布亚新几内亚'},
        {code: 'PK', name: '巴基斯坦'}, {code: 'PL', name: '波兰'}, {code: 'PR', name: '波多黎各'},
        {code: 'PS', name: '巴勒斯坦'}, {code: 'QA', name: '卡塔尔'}, {code: 'RO', name: '罗马尼亚'},
        {code: 'RS', name: '塞尔维亚'}, {code: 'RW', name: '卢旺达'}, {code: 'SA', name: '沙特阿拉伯'},
        {code: 'SB', name: '所罗门群岛'}, {code: 'SC', name: '塞舌尔'}, {code: 'SD', name: '苏丹'},
        {code: 'SI', name: '斯洛文尼亚'}, {code: 'SK', name: '斯洛伐克'}, {code: 'SL', name: '塞拉利昂'},
        {code: 'SM', name: '圣马力诺'}, {code: 'SN', name: '塞内加尔'}, {code: 'SO', name: '索马里'},
        {code: 'SR', name: '苏里南'}, {code: 'SS', name: '南苏丹'}, {code: 'ST', name: '圣多美和普林西比'},
        {code: 'SV', name: '萨尔瓦多'}, {code: 'SY', name: '叙利亚'}, {code: 'SZ', name: '斯威士兰'},
        {code: 'TD', name: '乍得'}, {code: 'TG', name: '多哥'}, {code: 'TJ', name: '塔吉克斯坦'},
        {code: 'TL', name: '东帝汶'}, {code: 'TM', name: '土库曼斯坦'}, {code: 'TN', name: '突尼斯'},
        {code: 'TO', name: '汤加'}, {code: 'TT', name: '特立尼达和多巴哥'}, {code: 'TZ', name: '坦桑尼亚'},
        {code: 'UA', name: '乌克兰'}, {code: 'UG', name: '乌干达'}, {code: 'UY', name: '乌拉圭'},
        {code: 'UZ', name: '乌兹别克斯坦'}, {code: 'VA', name: '梵蒂冈'}, {code: 'VC', name: '圣文森特'},
        {code: 'VE', name: '委内瑞拉'}, {code: 'VU', name: '瓦努阿图'}, {code: 'WS', name: '萨摩亚'},
        {code: 'YE', name: '也门'}, {code: 'ZA', name: '南非'},

    ];

    function flagUrl(code, src) {
        const c = code.toLowerCase();
        return src === 'circle'
            ? `https://cdn.jsdelivr.net/gh/HatScripts/circle-flags@2.8/flags/${c}.svg`
            : `https://flagcdn.com/w80/${c}.png`;
    }

    // DOM
    const $ = id => document.getElementById(id);
    const preview = $('preview');
    const fileInput = $('fileInput');
    const canvas = $('canvas');
    const ctx = canvas.getContext('2d');
    const hint = $('hint');
    const flagGrid = $('flagGrid');
    const flagSize = $('flagSize');
    const sizeVal = $('sizeVal');
    const srcGroup = $('srcGroup');
    const borderGroup = $('borderGroup');
    const borderColorInput = $('borderColor');
    const borderWidthInput = $('borderWidth');
    const bwVal = $('bwVal');
    const posGroup = $('posGroup');
    const btnSave = $('btnSave');
    const btnReset = $('btnReset');

    // State
    let avatarImg = null, flagImg = null, selectedFlag = null, originalName = '';
    let src = 'circle', pos = 'bottom-right', showBorder = true, borderColor = '#ffffff', borderWidth = 3;

    // 预览区点击上传
    preview.addEventListener('click', () => fileInput.click());

    // 上传
    fileInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        originalName = file.name.replace(/\.[^.]+$/, '');
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                avatarImg = img;
                const max = 500;
                let w = img.width, h = img.height;
                if (w > max || h > max) {
                    const r = Math.min(max / w, max / h);
                    w = Math.round(w * r);
                    h = Math.round(h * r);
                }
                canvas.width = w;
                canvas.height = h;
                hint.style.display = 'none';
                canvas.style.display = 'block';
                btnSave.disabled = false;
                draw();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 国旗网格
    function renderGrid() {
        flagGrid.innerHTML = '';
        FLAGS.forEach(f => {
            const el = document.createElement('div');
            el.className = 'flag';
            el.title = f.name;
            const img = document.createElement('img');
            img.src = flagUrl(f.code, src);
            img.alt = f.name;
            img.onerror = () => {
                el.textContent = f.code;
            };
            el.appendChild(img);
            el.addEventListener('click', () => pickFlag(f.code, el));
            flagGrid.appendChild(el);
            if (f.code === selectedFlag) {
                el.classList.add('selected');
                loadFlag(f.code);
            }
        });
        // 更多按钮
        const more = document.createElement('div');
        more.className = 'more-btn';
        more.title = '更多国旗';
        more.textContent = '+';
        more.addEventListener('click', e => {
            e.stopPropagation();
            openModal();
        });
        flagGrid.appendChild(more);
        if (!selectedFlag) {
            const cn = flagGrid.querySelector('[title="中国"]');
            if (cn) cn.click();
        }
    }

    // 更多国旗弹窗
    const modal = $('modal');
    const searchInput = $('searchInput');
    const allFlagList = $('allFlagList');

    function openModal() {
        renderAllFlags('');
        searchInput.value = '';
        modal.classList.add('show');
        setTimeout(() => searchInput.focus(), 50);
    }

    modal.addEventListener('click', e => {
        if (e.target === modal) modal.classList.remove('show');
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') modal.classList.remove('show');
    });

    searchInput.addEventListener('input', () => {
        renderAllFlags(searchInput.value.trim().toLowerCase());
    });

    function renderAllFlags(q) {
        allFlagList.innerHTML = '';
        const list = q
            ? ALL_FLAGS.filter(f => f.code.toLowerCase().includes(q) || f.name.toLowerCase().includes(q))
            : ALL_FLAGS;
        list.forEach(f => {
            const el = document.createElement('div');
            el.className = 'flag';
            el.title = f.name;
            const img = document.createElement('img');
            img.src = flagUrl(f.code, src);
            img.alt = f.name;
            img.onerror = () => {
                el.textContent = f.code;
            };
            el.appendChild(img);
            el.addEventListener('click', () => {
                // 加入常用列表
                if (!FLAGS.find(x => x.code === f.code)) FLAGS.push(f);
                pickFlag(f.code, null);
                modal.classList.remove('show');
                renderGrid();
            });
            allFlagList.appendChild(el);
        });
    }

    function loadFlag(code) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            flagImg = img;
            draw();
        };
        img.onerror = () => {
            flagImg = null;
            draw();
        };
        img.src = flagUrl(code, src);
    }

    function pickFlag(code, el) {
        flagGrid.querySelectorAll('.flag').forEach(d => d.classList.remove('selected'));
        if (el) el.classList.add('selected');
        selectedFlag = code;
        loadFlag(code);
    }

    renderGrid();

    // 通用按钮组切换
    function bindGroup(groupId, key, cb) {
        $(groupId).querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                $(groupId).querySelectorAll('button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const v = btn.dataset.v;
                if (key === 'src') {
                    src = v;
                    renderGrid();
                    return;
                }
                if (key === 'border') showBorder = v === 'on';
                if (key === 'pos') pos = v;
                draw();
            });
        });
    }

    bindGroup('srcGroup', 'src');
    bindGroup('borderGroup', 'border');
    bindGroup('posGroup', 'pos');

    // 大小滑块
    flagSize.addEventListener('input', () => {
        sizeVal.textContent = flagSize.value + '%';
        draw();
    });

    // 描边颜色
    borderColorInput.addEventListener('input', e => {
        borderColor = e.target.value;
        draw();
    });

    // 描边宽度
    borderWidthInput.addEventListener('input', e => {
        borderWidth = parseInt(e.target.value);
        bwVal.textContent = borderWidth;
        draw();
    });

    // 绘制
    function draw() {
        if (!avatarImg) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(avatarImg, 0, 0, canvas.width, canvas.height);
        if (!flagImg) return;

        const ratio = parseInt(flagSize.value) / 100;
        const fw = Math.round(canvas.width * ratio);
        const fh = Math.round(fw * (flagImg.height / flagImg.width));
        const pad = 4 + (showBorder ? borderWidth : 0);
        let fx, fy;
        if (pos === 'top-left') {
            fx = pad;
            fy = pad;
        } else if (pos === 'top-right') {
            fx = canvas.width - fw - pad;
            fy = pad;
        } else if (pos === 'bottom-left') {
            fx = pad;
            fy = canvas.height - fh - pad;
        } else {
            fx = canvas.width - fw - pad;
            fy = canvas.height - fh - pad;
        }

        if (showBorder) {
            const bp = borderWidth;
            ctx.save();
            ctx.fillStyle = borderColor;
            ctx.shadowColor = 'rgba(0,0,0,.3)';
            ctx.shadowBlur = 6;
            if (src === 'circle') {
                ctx.beginPath();
                ctx.arc(fx + fw / 2, fy + fh / 2, Math.max(fw, fh) / 2 + bp, 0, Math.PI * 2);
                ctx.fill();
            } else {
                roundRect(ctx, fx - bp, fy - bp, fw + bp * 2, fh + bp * 2, 4);
                ctx.fill();
            }
            ctx.restore();
        }
        ctx.drawImage(flagImg, fx, fy, fw, fh);
    }

    function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x + r, y);
        c.lineTo(x + w - r, y);
        c.quadraticCurveTo(x + w, y, x + w, y + r);
        c.lineTo(x + w, y + h - r);
        c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        c.lineTo(x + r, y + h);
        c.quadraticCurveTo(x, y + h, x, y + h - r);
        c.lineTo(x, y + r);
        c.quadraticCurveTo(x, y, x + r, y);
        c.closePath();
    }

    // 保存
    btnSave.addEventListener('click', () => {
        const a = document.createElement('a');
        const params = [selectedFlag, src, showBorder ? `border${borderWidth}` : 'noborder', pos];
        a.download = `${originalName}_${params.join('_')}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
    });

    // 重置
    btnReset.addEventListener('click', () => {
        avatarImg = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.display = 'none';
        hint.style.display = '';
        fileInput.value = '';
        btnSave.disabled = true;
    });
</script>
</body>
</html>
